<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>20260323 Homework3 — 황재연</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=DM+Mono:wght@300;400&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8f060;
      --accent2: #60d4f0;
      --text: #f0ede6;
      --muted: #888;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif KR', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.35;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* HEADER */
    header {
      padding: 5rem 0 4rem;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.8s ease both;
    }

    .back-link {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      line-height: 1.0;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    h1 em {
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }

    .header-meta {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    .header-meta span { display: flex; align-items: center; gap: 0.4rem; }
    .header-meta span::before { content: '—'; color: var(--accent); }

    /* MAIN */
    main { padding: 4rem 0 6rem; }

    /* SECTION */
    .section {
      margin-bottom: 5rem;
      animation: fadeUp 0.8s ease both;
    }
    .section:nth-child(1) { animation-delay: 0.1s; }
    .section:nth-child(2) { animation-delay: 0.2s; }
    .section:nth-child(3) { animation-delay: 0.3s; }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* TAG */
    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      display: inline-block;
      border: 1px solid;
    }
    .tag-py { color: var(--accent2); border-color: var(--accent2); }

    /* IMAGE GRID */
    .image-grid {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .image-block {
      background: var(--surface);
      overflow: hidden;
    }

    .image-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }

    .image-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .image-wrap {
      padding: 1.5rem;
    }

    .image-wrap img {
      width: 100%;
      display: block;
      filter: brightness(0.95);
      border: 1px solid var(--border);
    }

    .image-caption {
      padding: 0.8rem 1.5rem;
      background: #111;
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      border-top: 1px solid var(--border);
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 0;
    }
    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .footer-name {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .image-wrap { padding: 1rem; }
    }
  </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="container">

  <!-- HEADER -->
  <header>
    <a class="back-link" href="index.html">← 돌아가기</a>
    <p class="eyebrow">과제 2026.03.23</p>
    <h1>Homework <em>3</em></h1>
    <div class="header-meta">
      <span>황재연 · 2026210340</span>
      <span>컴퓨터·AI융합공학과</span>
      <span>Python</span>
    </div>
  </header>

  <main>

    <!-- 결과 이미지 -->
    <section class="section">
      <p class="section-label">결과 이미지</p>
      <div class="image-grid">

        <div class="image-block">
          <div class="image-header">
            <span class="image-num">IMAGE · 01</span>
            <span class="tag tag-py">Python</span>
          </div>
          <div class="image-wrap">
            <img src="homework3_1.png" alt="Homework 3 결과 이미지 1"/>
          </div>

        </div>

        <div class="image-block">
          <div class="image-header">
            <span class="image-num">IMAGE · 02</span>
            <span class="tag tag-py">Python</span>
          </div>
          <div class="image-wrap">
            <img src="homework3_2.png" alt="Homework 3 결과 이미지 2"/>
          </div>

        </div>

        <div class="image-block">
          <div class="image-header">
            <span class="image-num">IMAGE · 03</span>
            <span class="tag tag-py">Python</span>
          </div>
          <div class="image-wrap">
            <img src="homework3_3.png" alt="Homework 3 결과 이미지 3"/>
          </div>

        </div>

      </div>
    </section>

  </main>

  <footer>
    <div class="footer-inner">
      <span class="footer-name">황재연 · HWANG JAEYEON · 2026210340</span>
      <span class="footer-name">컴퓨터·AI융합공학과 · Homework 3</span>
    </div>
  </footer>

</div>
</body>
</html>
