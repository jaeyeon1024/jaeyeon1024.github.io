<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>황재연 — 컴퓨터·AI융합공학과</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=DM+Mono:wght@300;400&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8f060;
      --accent2: #60d4f0;
      --text: #f0ede6;
      --muted: #888;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif KR', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NOISE TEXTURE OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.35;
    }

    /* GRID LINES */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* LAYOUT */
    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* HEADER */
    header {
      padding: 5rem 0 4rem;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.8s ease both;
    }

    .header-inner {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 3rem;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.02em;
    }

    h1 .last {
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }

    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .avatar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      overflow: hidden;
      position: relative;
    }

    .avatar::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) 0deg, var(--accent2) 120deg, transparent 120deg);
      z-index: -1;
      animation: spin 6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* PHOTO PLACEHOLDER */
    .photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-align: center;
      padding: 0.5rem;
    }

    /* MAIN CONTENT */
    main {
      padding: 4rem 0;
    }

    .section {
      margin-bottom: 4rem;
      animation: fadeUp 0.8s ease both;
    }

    .section:nth-child(1) { animation-delay: 0.1s; }
    .section:nth-child(2) { animation-delay: 0.2s; }
    .section:nth-child(3) { animation-delay: 0.3s; }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* INFO CARDS */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .info-card {
      background: var(--surface);
      padding: 1.5rem;
      transition: background 0.2s;
    }

    .info-card:hover {
      background: #1e1e1e;
    }

    .info-card .label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--accent2);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .info-card .value {
      font-size: 0.95rem;
      color: var(--text);
      font-weight: 300;
    }

    /* CONTACT */
    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      transition: all 0.2s;
      background: var(--surface);
    }

    .contact-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200, 240, 96, 0.05);
    }

    .contact-link .icon {
      font-size: 1.1rem;
    }

    /* STATUS DOT */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-top: 1.5rem;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 0;
      animation: fadeUp 0.8s ease 0.4s both;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-name {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .footer-dept {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .header-inner { grid-template-columns: 1fr; }
      .avatar-wrap { display: none; }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>

  <div class="container">
    <header>
      <div class="header-inner">
        <div>
          <p class="eyebrow">Personal Page · 2026</p>
          <h1>황재연</span></h1>
          <div class="status">
            <span class="dot"></span>
            재학 중 · 컴퓨터·AI융합공학과
          </div>
        </div>
        <div class="avatar-wrap">
          <div class="avatar">
            <img src="profile.jpg" style="width:100%;height:100%;object-fit:cover;">
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="section">
        <p class="section-label">기본 정보</p>
        <div class="info-grid">
          <div class="info-card">
            <div class="label">이름</div>
            <div class="value">황재연</div>
          </div>
          <div class="info-card">
            <div class="label">학과</div>
            <div class="value">컴퓨터·AI융합공학과</div>
          </div>
          <div class="info-card">
            <div class="label">학번</div>
            <div class="value">2026210340</div>
          </div>
        </div>
      </section>

      <section class="section">
        <p class="section-label">연락처</p>
        <a class="contact-link" href="tel:01024222794">
          <span class="icon">📞</span>
          010 - 2422 - 2794
        </a>
      </section>

      <section class="section">
        <p class="section-label">소개</p>
        <p style="font-size:1rem; line-height:1.9; color:#ccc; font-weight:300;">
          안녕하세요, 컴퓨터·AI융합공학과에 재학 중인 황재연입니다.<br/>
          
        </p>
      </section>
    </main>

    <footer>
      <div class="footer-inner">
        <span class="footer-name">황재연 · HWANG JAEYEON</span>
        <span class="footer-dept">컴퓨터·AI융합공학과 · 2026210340</span>
      </div>
    </footer>
  </div>
</body>
</html>
